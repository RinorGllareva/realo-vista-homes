<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect for faster DNS/SSL handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Primary Meta Tags -->
    <title>Realo Real Estate | Properties for Sale & Rent in Prishtinë</title>
    <meta
      name="description"
      content="Discover apartments, houses, and land for sale or rent with Realo Real Estate. Browse verified listings in Prishtinë and beyond."
    />
    <meta name="author" content="Realo Real Estate" />
    <meta
      name="keywords"
      content="real estate Kosovo, apartments for sale Prishtinë, houses for rent, land for sale, Realo Real Estate, property listings Kosovo"
    />
    <link rel="canonical" href="https://realo-realestate.com" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="https://realo-realestate.com/logo.png"
    />

    <!-- Preload Critical Assets -->
    <link rel="preload" href="/src/main.tsx" as="script" crossorigin />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://realo-realestate.com" />
    <meta property="og:title" content="Realo Real Estate" />
    <meta
      property="og:description"
      content="Discover apartments, houses, and land with Realo Real Estate. Find your next property today."
    />
    <meta property="og:image" content="https://realo-realestate.com/RealoFullLogo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Realo Real Estate" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://realo-realestate.com" />
    <meta name="twitter:title" content="Realo Real Estate" />
    <meta
      name="twitter:description"
      content="Discover apartments, houses, and land with Realo Real Estate. Find your next property today."
    />
    <meta name="twitter:image" content="https://realo-realestate.com/RealoFullLogo.png" />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />
    <meta
      name="googlebot"
      content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#0e1424" />

    <!-- Facebook App -->
    <meta property="fb:app_id" content="2028894777883605" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Realo Real Estate",
        "url": "https://realo-realestate.com",
        "logo": "https://realo-realestate.com/logo.png",
        "description": "Realo Real Estate offers verified properties for sale and rent in Prishtinë and across Kosovo.",
        "sameAs": []
      }
    </script>

    <!-- Structured Data - RealEstateAgent -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Realo Real Estate",
        "url": "https://realo-realestate.com",
        "areaServed": {
          "@type": "Place",
          "name": "Kosovo"
        },
        "description": "Find apartments, houses, and land for sale or rent with Realo Real Estate."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
